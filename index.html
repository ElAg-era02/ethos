<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHOS TECHNOLOGIES V2.7 • ACCESS</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}

/* Pantalla d'intro */
#introScreen {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    opacity: 1;
    transition: opacity 1.5s ease;
}

/* Pantalla login */
#loginScreen {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#terminal {
    width: 80%;
    max-width: 600px;
    border: 2px solid #0f0;
    padding: 20px;
    font-size: 20px;
}

/* Input real — FORÇAT */
#realInput {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    z-index: 999999; /* per sobre de tot */
    width: 100%;
    height: 100%;
    pointer-events: auto; /* accepta clics */
    tabindex: 0;
}

#fakeText {
    display: inline-block;
    min-height: 24px;
}

#alertBox {
    margin-top: 20px;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.3s ease;
}
.alert-red { color: #f00; }
.alert-green { color: #0f0; }

#bigDenied {
    position: absolute;
    inset: 0;
    background: #000;
    color: #f00;
    font-size: 60px;
    display: none;
    align-items: center;
    justify-content: center;
}
</style>
</head>

<body>

<div id="introScreen">INITIALIZING SYSTEM...</div>

<div id="loginScreen">
    <div id="terminal">
        <span>ENTER PASSWORD: </span><span id="fakeText"></span>
    </div>
    <input id="realInput" type="password" autocomplete="off">
    <div id="alertBox"></div>
</div>

<div id="bigDenied">ACCESS DENIED</div>

<script>
/* INTRO → LOGIN */
setTimeout(() => {
    introScreen.style.opacity = "0";
    setTimeout(() => {
        introScreen.style.display = "none";
        loginScreen.style.display = "flex";
        forceFocus();
    }, 1500);
}, 3000);

/* VARIABLES */
let errorCount = 0;
let locked = false;

const realInput = document.getElementById("realInput");
const fakeText = document.getElementById("fakeText");
const alertBox = document.getElementById("alertBox");

/* =============================== */
/*   SISTEMA DE FOCUS FORÇAT       */
/* =============================== */

function forceFocus() {
    realInput.focus();
    realInput.click();

    /* Reintenta focus cada 50ms fins que l'usuari escrigui */
    const interval = setInterval(() => {
        if (document.activeElement !== realInput) {
            realInput.focus();
            realInput.click();
        }
        if (realInput.value.length > 0) clearInterval(interval);
    }, 50);
}

/* Quan l'usuari fa clic a qualsevol lloc → focus */
document.addEventListener("click", () => {
    realInput.focus();
});

/* Quan l'usuari tecleja → actualitza fakeText */
realInput.addEventListener("input", () => {
    fakeText.textContent = "*".repeat(realInput.value.length);
});

/* ENTER → verificar */
realInput.addEventListener("keydown", e => {
    if (e.key === "Enter") verificar();
});

/* ALERTES */
function showAlert(msg, color = "red") {
    alertBox.textContent = msg;
    alertBox.className = color === "red" ? "alert-red" : "alert-green";
    alertBox.style.opacity = "1";
    setTimeout(() => alertBox.style.opacity = "0", 1200);
}

/* ACCESS GRANTED */
function playAccessGranted(url) {
    showAlert("ACCESS GRANTED", "green");
    setTimeout(() => window.location.href = url, 800);
}

/* ACCESS DENIED */
function showAccessDeniedBig() {
    document.getElementById("bigDenied").style.display = "flex";
}
function lockSystem() { locked = true; }

/* VERIFICAR */
function verificar() {
    if (locked) return;

    const clave = realInput.value.trim();

    if (!clave) {
        errorCount++;
        showAlert("EMPTY INPUT");
        realInput.value = "";
        fakeText.textContent = "";
        forceFocus();
        if (errorCount >= 3) { showAccessDeniedBig(); lockSystem(); }
        return;
    }

    const PASSWORD = "Reset";

    if (clave === PASSWORD) {
        playAccessGranted("ethos.html");
    } else {
        errorCount++;
        showAlert("WRONG PASSWORD");
        realInput.value = "";
        fakeText.textContent = "";
        forceFocus();
        if (errorCount >= 3) { showAccessDeniedBig(); lockSystem(); }
    }
}
</script>

</body>
</html>
