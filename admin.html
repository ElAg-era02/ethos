<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>ETHOS · Admin Panel</title>
<style>
    body {
        background: #050505;
        color: #00ff00;
        font-family: Consolas, monospace;
        padding: 40px;
    }
    h1 { text-align: center; }
    .hidden { display: none; }
    input {
        background: #000;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 6px;
        margin: 4px;
        width: 250px;
    }
    button {
        background: #00ff00;
        color: #000;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
        font-weight: bold;
        margin: 4px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    td, th {
        border: 1px solid #00ff00;
        padding: 8px;
        text-align: left;
    }
    .delete-btn { background: #ff0000; color: #fff; }
    .edit-btn { background: #00aaff; color: #000; }
</style>
</head>
<body>

<h1>ETHOS · Panell d'Administració</h1>

<!-- LOGIN -->
<div id="login">
    <p>Introdueix la contrasenya:</p>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

    <h2>Llista de jocs</h2>
    <table id="gamesTable">
        <tr>
            <th>Nom</th>
            <th>URL</th>
            <th>Categoria</th>
            <th>Accions</th>
        </tr>
    </table>

    <h2>Afegir joc</h2>
    <input id="newName" placeholder="Nom del joc">
    <input id="newURL" placeholder="URL del joc">
    <input id="newCategory" placeholder="Categoria">
    <button onclick="addGame()">Afegir</button>

</div>

<script>
const PASSWORD = "Eric2881";

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        loadGames();
    } else {
        alert("Contrasenya incorrecta");
    }
}

function syncWithEthos() {
    localStorage.setItem("ethosNeedsReload", "1");
}

function loadGames() {
    const games = JSON.parse(localStorage.getItem("juegosRaw") || "[]");
    const table = document.getElementById("gamesTable");

    table.innerHTML = `
        <tr>
            <th>Nom</th>
            <th>URL</th>
            <th>Categoria</th>
            <th>Accions</th>
        </tr>
    `;

    games.forEach((game, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${game.name}</td>
            <td>${game.url}</td>
            <td>${game.category}</td>
            <td>
                <button class="edit-btn" onclick="editGame(${index})">Editar</button>
                <button class="delete-btn" onclick="deleteGame(${index})">Eliminar</button>
            </td>
        `;
        table.appendChild(row);
    });
}

function addGame() {
    const name = document.getElementById("newName").value;
    const url = document.getElementById("newURL").value;
    const category = document.getElementById("newCategory").value;

    if (!name || !url || !category) return alert("Falten camps");

    const games = JSON.parse(localStorage.getItem("juegosRaw") || "[]");
    games.push({ name, url, category });
    localStorage.setItem("juegosRaw", JSON.stringify(games));
    syncWithEthos();
    loadGames();
}

function deleteGame(index) {
    const games = JSON.parse(localStorage.getItem("juegosRaw") || "[]");
    games.splice(index, 1);
    localStorage.setItem("juegosRaw", JSON.stringify(games));
    syncWithEthos();
    loadGames();
}

function editGame(index) {
    const games = JSON.parse(localStorage.getItem("juegosRaw") || "[]");
    const game = games[index];

    const newName = prompt("Nou nom:", game.name);
    const newURL = prompt("Nou URL:", game.url);
    const newCategory = prompt("Nova categoria:", game.category);

    if (newName && newURL && newCategory) {
        games[index] = { name: newName, url: newURL, category: newCategory };
        localStorage.setItem("juegosRaw", JSON.stringify(games));
        syncWithEthos();
        loadGames();
    }
}
</script>

</body>
</html>
